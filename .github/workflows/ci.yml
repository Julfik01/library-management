<!-- .github/workflows/ci.yml -->
<!-- CI: test backend + build frontend on every push and PR to main/develop -->

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Backend — pytest against PostgreSQL
  # ─────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python 3.12 + PostgreSQL 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: libraryuser
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: library_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U libraryuser -d library_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://libraryuser:ci_password@localhost:5432/library_test_db
      DATABASE_URL: postgresql+asyncpg://libraryuser:ci_password@localhost:5432/library_test_db
      SECRET_KEY: ci_secret_key_at_least_32_characters_long
      ADMIN_EMAIL: admin@ci.test
      ADMIN_PASSWORD: ci_admin_password_123

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────
  # Frontend — TypeScript build
  # ─────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript + Vite)
        run: npm run build
