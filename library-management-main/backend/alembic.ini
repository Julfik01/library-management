# backend/alembic.ini
# Alembic configuration for the University Library Management System.
# CRITICAL: DB URL is read from environment variables in env.py — NOT set here.
# Setting sqlalchemy.url here would embed credentials in a committed file (T-01-01).

[alembic]
# Path to migration scripts (relative to this ini file)
script_location = alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for datetime stamps in generated filenames
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run the environment during alembic command execution
prepend_sys_path = .

# version location specification
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
